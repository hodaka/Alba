name: Release (bundle assets to zip)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Leave blank to use date.'
        required: false

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag/name
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            NAME="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            NAME="${{ github.ref_name }}"
          else
            NAME="snapshot-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create zip (exclude git/ci metadata)
        run: |
          ZIP="Alba-${{ steps.meta.outputs.name }}.zip"
          zip -r "$ZIP" . -x ".git/*" ".github/*" ".gitignore" "*.DS_Store"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Create / update GitHub Release and upload zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.name }}"
          # タグが無い手動実行時はタグを作ってから Release
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG" || true
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" --title "$TAG" --notes "Alba 設定資料集 一括ダウンロード用 zip"
          fi
